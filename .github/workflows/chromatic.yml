name: Chromatic

on:
  push:
    branches: [main]
  pull_request:

jobs:
  visual-regression:
    name: Visual regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          ELEVENTY_ENV: production
          TZ: Australia/Melbourne

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Run Chromatic
        run: npx chromatic --playwright -t=${{ secrets.CHROMATIC_PROJECT_TOKEN }} --exit-once-uploaded
