name: Chromatic

on:
  push:
    branches: [main]
  pull_request:

jobs:
  visual-regression:
    name: Visual regression tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          ELEVENTY_ENV: production

      - run: npx playwright install chromium

      - run: npx playwright test
        env:
          CI: true

      - run: npx chromatic --playwright -t=${{ secrets.CHROMATIC_PROJECT_TOKEN }} --exit-once-uploaded
