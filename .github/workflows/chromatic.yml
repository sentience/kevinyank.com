name: Chromatic

on: push

jobs:
  playwright:
    name: Build and capture visual snapshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build
        env:
          ELEVENTY_ENV: production
          TZ: Australia/Melbourne

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ./test-results
          retention-days: 30

  chromatic:
    name: Run Chromatic
    needs: playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Pin npm
        run: npm install --global npm@10.9.4

      - name: Install dependencies
        run: npm ci

      - name: Download Playwright test results
        uses: actions/download-artifact@v8
        with:
          name: test-results
          path: ./test-results

      # Temporary workaround while chromaui/chromatic-cli#1312 is under review.
      # Build the archive explicitly and upload the resulting static directory
      # instead of using Chromatic's broken npm-based E2E auto-build path.
      - name: Build Chromatic Storybook archive
        run: |
          npm exec -- build-archive-storybook --output-dir=./storybook-static 2>&1 | tee build-archive.log
        env:
          CHROMATIC_ARCHIVE_LOCATION: ./test-results

      - name: Run Chromatic
        run: |
          npx chromatic \
            --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }} \
            --storybook-build-dir=./storybook-static \
            --auto-accept-changes=main \
            --exit-once-uploaded \
            --diagnostics-file=chromatic-diagnostics.json \
            --log-file=chromatic.log

      - name: Upload Chromatic diagnostics
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: chromatic-diagnostics
          path: |
            ./build-archive.log
            ./chromatic.log
            ./chromatic-diagnostics.json
          if-no-files-found: warn
          retention-days: 30
