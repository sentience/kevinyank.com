name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.0
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          ELEVENTY_ENV: production

      - run: npm test
